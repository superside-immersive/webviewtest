<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Demo 2: VRM + MediaPipe Pose Lite (Performance Test)</title>

  <script>
    (function () {
      const { pathname, search, hash } = window.location;
      const lastSegment = pathname.split('/').pop();
      if (lastSegment && !lastSegment.includes('.') && !pathname.endsWith('/')) {
        window.location.replace(`${pathname}/${search}${hash}`);
      }
    })();
  </script>

  <script src="../shared/fps-overlay.js"></script>
  <script src="../shared/tracking-helpers.js"></script>
  <link rel="stylesheet" href="../shared/fps-overlay.css">

  <!-- Import maps for Three.js + VRM -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js"
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    body {
      position: relative;
      background: #000;
    }
    #three-canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    #camera-preview {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      object-fit: cover;
      transform: scaleX(-1);
      background: #050505;
    }
    #tracking-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    #status {
      position: fixed;
      top: 85px;
      left: 10px;
      right: 10px;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
    }
    #pose-debug {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
      padding: 8px;
      border-radius: 6px;
      z-index: 101;
      min-width: 200px;
      pointer-events: none;
    }
    #tracking-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 101;
      padding: 10px 14px;
      max-width: min(78vw, 420px);
      background: rgba(154, 14, 31, 0.92);
      color: #fff5f5;
      border: 1px solid rgba(255, 190, 190, 0.65);
      border-radius: 999px;
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="stats-container"></div>
  <div id="status">⏳ Initializing...</div>
  <video id="camera-preview" autoplay playsinline webkit-playsinline="true" muted></video>
  <canvas id="tracking-overlay"></canvas>
  <canvas id="three-canvas"></canvas>
  <div id="tracking-badge">Pose helper | build 2026-04-15a | waiting for camera</div>
  <div id="pose-debug">Pose: waiting...</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
    import { FilesetResolver, PoseLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs';
    import { VrmBodyRetargetLite } from '../shared/vrm-body-retarget-lite.js';

    // ==========================================
    // STATS.JS SETUP
    // ==========================================
    const stats = window.createStatsOverlay();
    stats.showPanel(0);
    document.getElementById('stats-container').appendChild(stats.dom);

    const statusEl = document.getElementById('status');
    const debugEl = document.getElementById('pose-debug');
    const trackingBadgeEl = document.getElementById('tracking-badge');
    const trackingOverlayEl = document.getElementById('tracking-overlay');
    const POSE_HELPER_BUILD = 'build 2026-04-15a';
    const runtimeEnv = (() => {
      const userAgent = navigator.userAgent || '';
      const isIOS = /iPad|iPhone|iPod/.test(userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isSlack = /Slack/i.test(userAgent);
      const delegateOrder = (isIOS || isSlack) ? ['CPU', 'GPU'] : ['GPU', 'CPU'];
      return { userAgent, isIOS, isSlack, delegateOrder };
    })();

    const setTrackingBadge = (message) => {
      trackingBadgeEl.textContent = `Pose helper | ${POSE_HELPER_BUILD} | ${message}`;
    };

    const setStatus = (msg, autoHide = 0) => {
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      if (autoHide > 0) setTimeout(() => statusEl.style.display = 'none', autoHide);
    };

    setTrackingBadge('waiting for camera');

    // ==========================================
    // THREE.JS SCENE SETUP (Minimal)
    // ==========================================
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearAlpha(0);

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 4.0);
    camera.lookAt(0, 0.9, 0);

    const CAMERA_FRAME_OPTIONS = {
      distanceMultiplier: 1.35,
      minimumDistance: 3.8,
      targetHeightFactor: 0.42,
      cameraHeightFactor: 0.58,
    };

    function updateCameraDebugTarget(target) {
      window.__page2Camera = camera;
      window.__page2CameraTarget = {
        x: Number(target.x.toFixed(4)),
        y: Number(target.y.toFixed(4)),
        z: Number(target.z.toFixed(4)),
      };
    }

    function frameLoadedVrm(vrm) {
      if (!vrm?.scene) {
        return;
      }

      vrm.scene.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(vrm.scene);
      if (box.isEmpty()) {
        return;
      }

      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const halfFovY = THREE.MathUtils.degToRad(camera.fov * 0.5);
      const fitHeightDistance = (size.y * 0.5) / Math.tan(halfFovY);
      const fitWidthDistance = ((size.x / Math.max(camera.aspect, 0.001)) * 0.5) / Math.tan(halfFovY);
      const distance = Math.max(
        CAMERA_FRAME_OPTIONS.minimumDistance,
        Math.max(fitHeightDistance, fitWidthDistance) * CAMERA_FRAME_OPTIONS.distanceMultiplier
      );
      const target = new THREE.Vector3(
        center.x,
        box.min.y + size.y * CAMERA_FRAME_OPTIONS.targetHeightFactor,
        center.z,
      );

      camera.position.set(
        center.x,
        box.min.y + size.y * CAMERA_FRAME_OPTIONS.cameraHeightFactor,
        center.z + distance,
      );
      camera.lookAt(target);
      updateCameraDebugTarget(target);
    }

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(-1, 2, 2);
    scene.add(dirLight);

    // Grid
    const grid = new THREE.GridHelper(6, 12, 0x333355, 0x222244);
    scene.add(grid);

    // ==========================================
    // VRM LOADING
    // ==========================================
    let currentVrm = null;
    let bodyRetargeter = null;

    setStatus('⏳ Loading VRM model...');
    const gltfLoader = new GLTFLoader();
    gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

    const VRM_PATH = './assets/character.vrm';

    try {
      const gltf = await new Promise((resolve, reject) => {
        gltfLoader.load(VRM_PATH, resolve, undefined, reject);
      });

      const vrm = gltf.userData.vrm;
      if (!vrm) throw new Error('VRM not found in GLTF');

      VRMUtils.removeUnnecessaryJoints(vrm.scene);
      vrm.scene.traverse((obj) => { obj.frustumCulled = false; });
      scene.add(vrm.scene);
      frameLoadedVrm(vrm);
      currentVrm = vrm;
      bodyRetargeter = new VrmBodyRetargetLite(vrm, {
        visibilityThreshold: 0.35,
        presenceThreshold: 0.15,
        rotationSpeed: 12,
      });
      window.__page2Debug = { currentVrm, bodyRetargeter };
      console.log('✅ VRM loaded (body retargeter ready)');
      setStatus('✅ VRM loaded. Initializing camera...');
    } catch (err) {
      console.error('VRM load error:', err);
      setStatus(`❌ Error loading VRM: ${err.message}`);
    }

    // ==========================================
    // CAMERA SETUP
    // ==========================================
    const videoEl = document.getElementById('camera-preview');
    let cameraReady = false;

    if (!window.isSecureContext) {
      setStatus('⚠️ Camera access only works on https:// or http://localhost');
    } else {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        videoEl.srcObject = stream;
        await new Promise((resolve) => { videoEl.onloadeddata = resolve; });
        cameraReady = true;
        console.log('✅ Camera ready');
        setTrackingBadge('camera active');
        TrackingHelpers.drawCameraGuide(trackingOverlayEl, 'Pose helper active');
        setStatus('✅ Camera ready. Initializing MediaPipe...');
      } catch (err) {
        console.error('Camera error:', err);
        setTrackingBadge('camera blocked');
        setStatus(`❌ Camera error: ${err.message}`);
      }
    }

    // ==========================================
    // MEDIAPIPE POSE LANDMARKER (LITE)
    // ==========================================
    let poseLandmarker = null;
    let activePoseDelegate = 'unknown';

    async function createPoseLandmarkerWithFallback(vision) {
      let lastError = null;

      for (const delegate of runtimeEnv.delegateOrder) {
        try {
          const landmarker = await PoseLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task',
              delegate,
            },
            runningMode: 'VIDEO',
            numPoses: 1,
            minPoseDetectionConfidence: 0.5,
            minPosePresenceConfidence: 0.5,
            minTrackingConfidence: 0.5,
            outputSegmentationMasks: false,
          });

          activePoseDelegate = delegate;
          return landmarker;
        } catch (error) {
          lastError = error;
          console.warn(`PoseLandmarker ${delegate} init failed`, error);
        }
      }

      throw lastError ?? new Error('Unable to initialize PoseLandmarker');
    }

    if (cameraReady) {
      try {
        setStatus('⏳ Loading MediaPipe Pose (Lite)...');
        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
        );

        poseLandmarker = await createPoseLandmarkerWithFallback(vision);

        window.__page2Runtime = { runtimeEnv, activePoseDelegate };
        console.log(`✅ PoseLandmarker ready (LITE, ${activePoseDelegate})`);
        setTrackingBadge('tracking');
        setStatus(`✅ Everything is ready — Pose Lite + VRM body retarget (${activePoseDelegate})`, 5000);
      } catch (err) {
        console.error('MediaPipe init error:', err);
        setTrackingBadge('mediapipe error');
        setStatus(`❌ MediaPipe error: ${err.message}`);
      }
    }

    // ==========================================
    // RENDER LOOP
    // ==========================================
    let lastVideoTime = -1;
    let debugCounter = 0;
    let poseDetected = false;
    let lastFrameNowMs = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      stats.begin();

      const nowMs = performance.now();
      const deltaSeconds = Math.min(0.1, Math.max(1 / 240, (nowMs - lastFrameNowMs) / 1000));
      lastFrameNowMs = nowMs;

      let latestRetargetStats = null;

      if (poseLandmarker && cameraReady && videoEl.readyState >= 2) {
        if (videoEl.currentTime !== lastVideoTime) {
          lastVideoTime = videoEl.currentTime;
          try {
            const result = poseLandmarker.detectForVideo(videoEl, nowMs);

            if (result && result.landmarks && result.landmarks.length > 0) {
              const lm = result.landmarks[0];
              const worldLm = result.worldLandmarks?.[0];
              poseDetected = true;
              debugCounter++;
              TrackingHelpers.drawPose(trackingOverlayEl, videoEl, lm, { mirrored: true });
              latestRetargetStats = bodyRetargeter?.update(result, deltaSeconds) ?? null;
              setTrackingBadge(worldLm?.length ? 'tracking 3d' : 'tracking 2d');
              if (debugCounter % 15 === 0) {
                const nose = lm[0];
                const lShoulder = lm[11];
                const rShoulder = lm[12];
                debugEl.innerHTML = 
                  `<b>Pose DETECTED ✅</b><br>` +
                  `Source: ${worldLm?.length ? 'WORLD_3D' : 'NORMALIZED_2D'}<br>` +
                  `Landmarks: ${lm.length}<br>` +
                  `Nose: (${nose.x.toFixed(2)}, ${nose.y.toFixed(2)})<br>` +
                  `L.Shoulder: (${lShoulder.x.toFixed(2)}, ${lShoulder.y.toFixed(2)})<br>` +
                  `R.Shoulder: (${rShoulder.x.toFixed(2)}, ${rShoulder.y.toFixed(2)})`;
              }
            } else {
              latestRetargetStats = bodyRetargeter?.update(null, deltaSeconds) ?? null;
              if (poseDetected) {
                debugEl.innerHTML = 'Pose: searching...';
                poseDetected = false;
              }
              setTrackingBadge('no landmarks');
              TrackingHelpers.drawCameraGuide(trackingOverlayEl, 'Pose helper without landmarks');
            }
          } catch (err) {
            latestRetargetStats = bodyRetargeter?.update(null, deltaSeconds) ?? null;
          }
        }
      } else {
        latestRetargetStats = bodyRetargeter?.update(null, deltaSeconds) ?? null;
      }

      if (currentVrm) {
        currentVrm.update(deltaSeconds);
      }

      renderer.render(scene, camera);
      stats.end();
    }

    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      if (currentVrm) {
        frameLoadedVrm(currentVrm);
      }
      renderer.setSize(window.innerWidth, window.innerHeight);
      TrackingHelpers.drawCameraGuide(trackingOverlayEl, cameraReady ? 'Pose helper active' : 'Pose helper waiting for camera');
    });

    TrackingHelpers.drawCameraGuide(trackingOverlayEl, 'Pose helper waiting for camera');
  </script>
</body>
</html>

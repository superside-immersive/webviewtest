<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Demo 2: VRM + MediaPipe Pose Lite (Performance Test)</title>

  <script>
    (function () {
      const { pathname, search, hash } = window.location;
      const lastSegment = pathname.split('/').pop();
      if (lastSegment && !lastSegment.includes('.') && !pathname.endsWith('/')) {
        window.location.replace(`${pathname}/${search}${hash}`);
      }
    })();
  </script>

  <script src="../shared/fps-overlay.js"></script>
  <script src="../shared/tracking-helpers.js"></script>
  <link rel="stylesheet" href="../shared/fps-overlay.css">

  <!-- Import maps for Three.js + VRM -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.min.js"
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }
    body {
      position: relative;
      background: #000;
    }
    #three-canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    #camera-preview {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      object-fit: cover;
      transform: scaleX(-1);
      background: #050505;
    }
    #tracking-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    #status {
      position: fixed;
      top: 85px;
      left: 10px;
      right: 10px;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
    }
    #pose-debug {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
      padding: 8px;
      border-radius: 6px;
      z-index: 101;
      min-width: 200px;
      pointer-events: none;
    }
    #tracking-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 101;
      padding: 8px 12px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      font-family: monospace;
      font-size: 11px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="stats-container"></div>
  <div id="status">⏳ Inicializando...</div>
  <video id="camera-preview" autoplay playsinline muted></video>
  <canvas id="tracking-overlay"></canvas>
  <canvas id="three-canvas"></canvas>
  <div id="tracking-badge">Pose helper: esperando cámara</div>
  <div id="pose-debug">Pose: esperando...</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
    import { FilesetResolver, PoseLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs';

    // ==========================================
    // STATS.JS SETUP
    // ==========================================
    const stats = window.createStatsOverlay();
    stats.showPanel(0);
    document.getElementById('stats-container').appendChild(stats.dom);

    const statusEl = document.getElementById('status');
    const debugEl = document.getElementById('pose-debug');
    const trackingBadgeEl = document.getElementById('tracking-badge');
    const trackingOverlayEl = document.getElementById('tracking-overlay');
    const setStatus = (msg, autoHide = 0) => {
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      if (autoHide > 0) setTimeout(() => statusEl.style.display = 'none', autoHide);
    };

    // ==========================================
    // THREE.JS SCENE SETUP (Minimal)
    // ==========================================
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearAlpha(0);

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.0, 3.0);
    camera.lookAt(0, 1.0, 0);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(-1, 2, 2);
    scene.add(dirLight);

    // Grid
    const grid = new THREE.GridHelper(6, 12, 0x333355, 0x222244);
    scene.add(grid);

    // ==========================================
    // VRM LOADING (STATIC — just displayed, not driven by tracking)
    // ==========================================
    let currentVrm = null;

    setStatus('⏳ Cargando modelo VRM...');
    const gltfLoader = new GLTFLoader();
    gltfLoader.register((parser) => new VRMLoaderPlugin(parser));

    const VRM_PATH = './assets/character.vrm';

    try {
      const gltf = await new Promise((resolve, reject) => {
        gltfLoader.load(VRM_PATH, resolve, undefined, reject);
      });

      const vrm = gltf.userData.vrm;
      if (!vrm) throw new Error('VRM not found in GLTF');

      VRMUtils.removeUnnecessaryJoints(vrm.scene);
      vrm.scene.traverse((obj) => { obj.frustumCulled = false; });
      scene.add(vrm.scene);
      currentVrm = vrm;
      console.log('✅ VRM loaded (static display)');
      setStatus('✅ VRM cargado (estático). Inicializando cámara...');
    } catch (err) {
      console.error('VRM load error:', err);
      setStatus(`❌ Error cargando VRM: ${err.message}`);
    }

    // ==========================================
    // CAMERA SETUP
    // ==========================================
    const videoEl = document.getElementById('camera-preview');
    let cameraReady = false;

    if (!window.isSecureContext) {
      setStatus('⚠️ La cámara solo funciona en https:// o http://localhost');
    } else {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        videoEl.srcObject = stream;
        await new Promise((resolve) => { videoEl.onloadeddata = resolve; });
        cameraReady = true;
        console.log('✅ Camera ready');
        trackingBadgeEl.textContent = 'Pose helper: cámara activa';
        TrackingHelpers.drawCameraGuide(trackingOverlayEl, 'Pose helper activo');
        setStatus('✅ Cámara lista. Inicializando MediaPipe...');
      } catch (err) {
        console.error('Camera error:', err);
        trackingBadgeEl.textContent = 'Pose helper: cámara bloqueada';
        setStatus(`❌ Error cámara: ${err.message}`);
      }
    }

    // ==========================================
    // MEDIAPIPE POSE LANDMARKER (LITE) — runs independently, NOT connected to VRM
    // ==========================================
    let poseLandmarker = null;

    if (cameraReady) {
      try {
        setStatus('⏳ Cargando MediaPipe Pose (Lite)...');
        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm'
        );

        poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task',
            delegate: 'GPU'
          },
          runningMode: 'VIDEO',
          numPoses: 1,
          minPoseDetectionConfidence: 0.5,
          minPosePresenceConfidence: 0.5,
          minTrackingConfidence: 0.5,
          outputSegmentationMasks: false
        });

        console.log('✅ PoseLandmarker ready (LITE)');
        trackingBadgeEl.textContent = 'Pose helper: trackeando';
        setStatus('✅ Todo listo — VRM estático + Pose Lite corriendo en paralelo', 5000);
      } catch (err) {
        console.error('MediaPipe init error:', err);
        trackingBadgeEl.textContent = 'Pose helper: error MediaPipe';
        setStatus(`❌ Error MediaPipe: ${err.message}`);
      }
    }

    // ==========================================
    // RENDER LOOP — VRM renders, MediaPipe runs, but they are NOT connected
    // ==========================================
    let lastVideoTime = -1;
    let debugCounter = 0;
    let poseDetected = false;

    function animate() {
      requestAnimationFrame(animate);
      stats.begin();

      // Run pose detection (just to burn GPU/CPU and measure FPS impact)
      if (poseLandmarker && cameraReady && videoEl.readyState >= 2) {
        const nowMs = performance.now();
        if (videoEl.currentTime !== lastVideoTime) {
          lastVideoTime = videoEl.currentTime;
          try {
            const result = poseLandmarker.detectForVideo(videoEl, nowMs);

            // Just log detection results for debug — NOT applying to VRM
            if (result && result.landmarks && result.landmarks.length > 0) {
              const lm = result.landmarks[0];
              poseDetected = true;
              debugCounter++;
              TrackingHelpers.drawPose(trackingOverlayEl, videoEl, lm, { mirrored: true });
              if (debugCounter % 15 === 0) {
                const nose = lm[0];
                const lShoulder = lm[11];
                const rShoulder = lm[12];
                debugEl.innerHTML = 
                  `<b>Pose DETECTED ✅</b><br>` +
                  `Landmarks: ${lm.length}<br>` +
                  `Nose: (${nose.x.toFixed(2)}, ${nose.y.toFixed(2)})<br>` +
                  `L.Shoulder: (${lShoulder.x.toFixed(2)}, ${lShoulder.y.toFixed(2)})<br>` +
                  `R.Shoulder: (${rShoulder.x.toFixed(2)}, ${rShoulder.y.toFixed(2)})`;
              }
            } else {
              if (poseDetected) {
                debugEl.innerHTML = 'Pose: buscando...';
                poseDetected = false;
              }
              TrackingHelpers.drawCameraGuide(trackingOverlayEl, 'Pose helper sin landmarks');
            }
          } catch (err) {
            // Silently handle detection errors
          }
        }
      }

      // Update VRM (tick for internal updates, but no pose applied)
      if (currentVrm) {
        currentVrm.update(1 / 60);
      }

      renderer.render(scene, camera);
      stats.end();
    }

    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      TrackingHelpers.drawCameraGuide(trackingOverlayEl, cameraReady ? 'Pose helper activo' : 'Pose helper esperando cámara');
    });

    TrackingHelpers.drawCameraGuide(trackingOverlayEl, 'Pose helper esperando cámara');
  </script>
</body>
</html>
